name: Python CI

on:
  push:
    branches: [beta, main]
    paths:
      - "**.py"
      - "custom_components/**"
      - "tests/**"
      - "pyproject.toml"
      - "requirements*.txt"
      - ".github/workflows/pytest.yaml"
  pull_request:
    branches: [beta, main]
    paths:
      - "**.py"
      - "custom_components/**"
      - "tests/**"
      - "pyproject.toml"
      - "requirements*.txt"
      - ".github/workflows/pytest.yaml"
  schedule:
    - cron: "0 7 1-28/7 * *"

jobs:
  tests:
    runs-on: ubuntu-latest
    name: Pytest
    strategy:
      matrix:
        python-version:
          - "3.13"
          - "3.14"

    steps:
      - name: 📥 Checkout the repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 2
      - name: 🛠️ Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: 🚀 Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: 📦 Install requirements
        run: uv pip install --system ".[test]"
      - name: 🏃 Run pytest
        run: pytest tests --cov=custom_components/keymaster --cov-report=xml
      - name: 📤 Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-data
          path: coverage.xml

  lint:
    runs-on: ubuntu-latest
    name: Lint (ruff)
    steps:
      - name: 📥 Checkout the repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: 🛠️ Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: 🚀 Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: 📦 Install requirements
        run: uv pip install --system ".[lint]"
      - name: 🧹 Run ruff format check
        run: ruff format --check custom_components/ tests/
      - name: 🔍 Run ruff check
        run: ruff check custom_components/ tests/

  mypy:
    runs-on: ubuntu-latest
    name: Type check (mypy)
    steps:
      - name: 📥 Checkout the repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: 🛠️ Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: 🚀 Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: 📦 Install requirements
        run: uv pip install --system ".[test,lint]"
      - name: 🔎 Run mypy
        run: mypy custom_components/keymaster

  coverage:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: 📥 Checkout the repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 2
      - name: 📥 Download coverage data
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-data
      - name: 📤 Upload coverage report
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: python
          files: ./coverage.xml
