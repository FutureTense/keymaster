name: Bug report
description: Create a report to help us improve
title: "ISSUE: "
labels: ["pending"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: input
    id: ha-version
    attributes:
      label: Home Assistant version
      placeholder: "e.g. 2026.5.0"
    validations:
      required: true

  - type: input
    id: component-version
    attributes:
      label: Keymaster version
      placeholder: "e.g. v0.3.4"
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Home Assistant installation type
      options:
        - Home Assistant OS
        - Home Assistant Container (Docker)
        - Home Assistant Core
        - Home Assistant Supervised
    validations:
      required: false

  - type: dropdown
    id: lock-provider
    attributes:
      label: Lock provider
      description: "The integration provider configured for your lock"
      options:
        - local_akuvox
        - schlage
        - zha
        - zigbee2mqtt
        - zwave_js
    validations:
      required: true

  - type: input
    id: lock-model
    attributes:
      label: Lock make and model
      placeholder: "e.g. Schlage BE469"
    validations:
      required: false

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Tell us how to reproduce this issue.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste any relevant error logs here.
      render: text

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem.

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: >-
        Add any other context about the problem here (e.g. email in plain/text format
        if applicable).
